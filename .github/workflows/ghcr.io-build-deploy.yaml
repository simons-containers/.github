name: Build and publish container

permissions:
  id-token: write
  contents: read
  packages: write
  attestations: write

on:
  workflow_call:
    inputs:
      registry:
        type: string
        required: true
      image:
        type: string
        required: true
      appname:
        type: string
        required: true
      target:
        type: string
        required: false
    secrets:
      ghcr_token:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REGISTRY: ${{ inputs.registry }}
      IMAGE: ${{ inputs.image }}
      APPNAME: ${{ inputs.appname }}

    steps:
      - uses: actions/checkout@v7
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: buildx

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }}

      - name: Compute tags
        id: meta
        run: |
          VERSION=$(yq -r .${{ inputs.appname }} versions.yaml)
          LATEST="latest"

          if [[ "${GITHUB_REF_NAME}" != "main" && "${GITHUB_REF_NAME}" != "master" ]]; then
            VERSION="${VERSION}-${GITHUB_REF_NAME//\//-}"
            LATEST=""
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Generate build args
        id: args
        run: |
          {
            yq -r 'to_entries[] | "\(.key | upcase)_VERSION=\(.value)"' versions.yaml
          } > build-args.txt

          echo "args<<EOF" >> "$GITHUB_OUTPUT"
          cat build-args.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          # Computed tags
          tags: |
            ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.latest && format('{0}/{1}:{2}', inputs.registry, inputs.image, steps.meta.outputs.latest) }}
          # Use build args from args step
          build-args: ${{ steps.args.outputs.args }}
          # Conditionally include the target
          target: ${{ inputs.target != '' && inputs.target || '' }}
          sbom: true
          provenance: mode=max
          outputs: type=image
          platforms: linux/amd64

      - name: Sign image with Cosign
        run: |
          cosign sign --yes ${{ inputs.registry }}/${{ inputs.image }}@${{ steps.build.outputs.digest }}

      - name: Scan image
        id: grype
        uses: anchore/scan-action@v7
        with:
          image: ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.meta.outputs.version }}
          output-format: json

      - name: Add scan to summary
        run: |
          FILE="${{ steps.grype.outputs.json }}"
      
          printf "## Grype Vulnerability Report\n\n" >> $GITHUB_STEP_SUMMARY
      
          # Total count
          COUNT=$(jq '.matches | length' "$FILE")
          printf "✔ Scanned for vulnerabilities     [%s vulnerability matches]\n\n" "$COUNT" >> $GITHUB_STEP_SUMMARY

          # Table header
          printf "| NAME | INSTALLED | FIXED IN | TYPE | VULNERABILITY | SEVERITY | EPSS | RISK |\n" >> $GITHUB_STEP_SUMMARY
          printf "|------|-----------|----------|------|---------------|----------|------|------|\n" >> $GITHUB_STEP_SUMMARY
      
          # Table rows
          jq -r '
            .matches[]
            | {
                name: .artifact.name,
                installed: .artifact.version,
                fixed: (.vulnerability.fix.versions | join(", ")),
                type: .artifact.type,
                vuln: .vulnerability.id,
                sev: .vulnerability.severity,
                epss: (if (.vulnerability.epss|length)>0
                       then (.vulnerability.epss[0].epss|tostring + " (" + ((.vulnerability.epss[0].percentile*100|floor|tostring) + "th)") )
                       else "" end),
                risk: (.vulnerability.risk // "")
              }
            | [
                .name,
                .installed,
                (if .fixed=="" then "" else .fixed end),
                .type,
                .vuln,
                (if .sev=="Critical" then "<span style=\"color:red\">Critical</span>"
                 elif .sev=="High" then "<span style=\"color:#d97706\">High</span>"
                 elif .sev=="Medium" then "<span style=\"color:#ca8a04\">Medium</span>"
                 elif .sev=="Low" then "<span style=\"color:#16a34a\">Low</span>"
                 else "<span style=\"color:#6b7280\">" + .sev + "</span>" end),
                .epss,
                .risk
              ]
            | join(" | ")
            | "| " + . + " |"
          ' "$FILE" >> $GITHUB_STEP_SUMMARY

      - name: Attest container
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: false
